name: Perf

on:
  workflow_dispatch:
    inputs:
      comment_count:
        description: "Comment attachment count"
        required: false
        default: "2000"
      comment_iterations:
        description: "Comment attachment iterations"
        required: false
        default: "5"
      comment_warmup:
        description: "Comment attachment warmup iterations"
        required: false
        default: "1"
      comment_output:
        description: "Comment attachment output CSV path"
        required: false
        default: "perf/results_comment_attachment.csv"
      graph_nodes:
        description: "Graph validation node count"
        required: false
        default: "1000"
      graph_edges:
        description: "Graph validation edge count"
        required: false
        default: "2000"
      graph_iterations:
        description: "Graph validation iterations"
        required: false
        default: "5"
      graph_warmup:
        description: "Graph validation warmup iterations"
        required: false
        default: "1"
      graph_mode:
        description: "Graph validation mode (nodes|edges|both)"
        required: false
        default: "both"
      graph_output:
        description: "Graph validation output CSV path"
        required: false
        default: "perf/results_graph_validation.csv"
      layout_nodes:
        description: "Recursive layout node count"
        required: false
        default: "500"
      layout_edges:
        description: "Recursive layout edge count"
        required: false
        default: "1000"
      layout_iterations:
        description: "Recursive layout iterations"
        required: false
        default: "5"
      layout_warmup:
        description: "Recursive layout warmup iterations"
        required: false
        default: "1"
      layout_algorithm:
        description: "Recursive layout algorithm"
        required: false
        default: "fixed"
      layout_validate_graph:
        description: "Validate graph before layout (true|false)"
        required: false
        default: "false"
      layout_validate_options:
        description: "Validate options before layout (true|false)"
        required: false
        default: "false"
      layout_output:
        description: "Recursive layout output CSV path"
        required: false
        default: "perf/results_recursive_layout.csv"
      recursive_scenarios:
        description: "Recursive layout scenario list (comma-separated; empty uses recursive_scenario_profile)"
        required: false
        default: ""
      recursive_scenario_profile:
        description: "Recursive layout scenario profile (quick|default|full)"
        required: false
        default: "default"
      recursive_scenario_iterations:
        description: "Recursive layout scenario iterations"
        required: false
        default: "5"
      recursive_scenario_warmup:
        description: "Recursive layout scenario warmup iterations"
        required: false
        default: "1"
      recursive_scenario_output:
        description: "Recursive layout scenarios output CSV path"
        required: false
        default: "perf/results_recursive_layout_scenarios.csv"
      recursive_runtime_budget_gate:
        description: "Fail when recursive scenario avg_ms exceeds profile budget (true|false)"
        required: false
        default: "false"
      recursive_runtime_budget_ms_quick:
        description: "Recursive runtime budget avg_ms for quick profile"
        required: false
        default: "40"
      recursive_runtime_budget_ms_default:
        description: "Recursive runtime budget avg_ms for default profile"
        required: false
        default: "60"
      recursive_runtime_budget_ms_full:
        description: "Recursive runtime budget avg_ms for full profile"
        required: false
        default: "120"
      layered_issue_scenarios:
        description: "Layered issue scenario list"
        required: false
        default: "issue_405,issue_603,issue_680,issue_871,issue_905"
      layered_issue_iterations:
        description: "Layered issue scenario iterations"
        required: false
        default: "20"
      layered_issue_warmup:
        description: "Layered issue scenario warmup iterations"
        required: false
        default: "3"
      layered_issue_output:
        description: "Layered issue scenario output CSV path"
        required: false
        default: "perf/results_layered_issue_scenarios.csv"
      perf_compare_mode:
        description: "Perf comparison mode (window|baseline|both)"
        required: false
        default: "window"
      baseline_layered_file:
        description: "Layered issue baseline CSV path"
        required: false
        default: "perf/baselines/layered_issue_scenarios.csv"
      baseline_recursive_scenarios_file:
        description: "Recursive layout scenarios baseline CSV path"
        required: false
        default: "perf/baselines/recursive_layout_scenarios.csv"
      regression_threshold:
        description: "Regression threshold percent"
        required: false
        default: "5"
      regression_window:
        description: "Regression moving window size"
        required: false
        default: "3"
      regression_gate:
        description: "Fail workflow on regression (true|false)"
        required: false
        default: "false"
      java_compare_enabled:
        description: "Enable Java vs Rust layered issue compare (true|false)"
        required: false
        default: "true"
      java_compare_mode:
        description: "Java compare mode (results|baseline|both)"
        required: false
        default: "both"
      java_generate_enabled:
        description: "Generate Java layered issue CSV before compare (true|false)"
        required: false
        default: "true"
      java_generate_dry_run:
        description: "Print Java perf Maven command only (true|false)"
        required: false
        default: "false"
      java_allow_generate_failure:
        description: "Allow Java generation failure and continue (true|false)"
        required: false
        default: "false"
      java_generate_retries:
        description: "Java generation retry count"
        required: false
        default: "0"
      java_generate_retry_delay_secs:
        description: "Java generation retry delay seconds"
        required: false
        default: "3"
      java_skip_dns_check:
        description: "Skip Java generation DNS preflight (true|false)"
        required: false
        default: "false"
      java_required_hosts:
        description: "Comma-separated required hosts for Java generation DNS preflight"
        required: false
        default: "repo.eclipse.org,repo.maven.apache.org"
      java_export_baseline_candidate:
        description: "Export Java results as baseline candidate artifact (true|false)"
        required: false
        default: "true"
      java_export_candidate_strict:
        description: "Fail when baseline candidate export validation fails (true|false)"
        required: false
        default: "true"
      java_results_file:
        description: "Java layered issue CSV path"
        required: false
        default: "perf/java_results_layered_issue_scenarios.csv"
      java_baseline_file:
        description: "Java layered issue baseline CSV path"
        required: false
        default: "perf/baselines/java_layered_issue_scenarios.csv"
      java_baseline_candidate_file:
        description: "Java layered issue baseline candidate CSV path"
        required: false
        default: "perf/baselines/java_layered_issue_scenarios.candidate.csv"
      java_artifact_min_rows:
        description: "Minimum required rows in Java CSV artifact (effective floor also respects scenario count)"
        required: false
        default: "1"
      java_parity_threshold:
        description: "Java parity regression threshold percent"
        required: false
        default: "0"
      java_parity_thresholds_file:
        description: "Java per-scenario parity threshold CSV path"
        required: false
        default: "perf/java_parity_thresholds.csv"
      java_parity_gate:
        description: "Fail workflow on Java parity regression (true|false)"
        required: false
        default: "true"
      java_baseline_parity_threshold:
        description: "Java baseline parity regression threshold percent"
        required: false
        default: "0"
      java_baseline_parity_gate:
        description: "Fail workflow on Java baseline parity regression (true|false)"
        required: false
        default: "true"

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run perf scripts
        run: sh scripts/run_perf_all.sh
        env:
          COMMENT_COUNT: ${{ inputs.comment_count }}
          COMMENT_ITERATIONS: ${{ inputs.comment_iterations }}
          COMMENT_WARMUP: ${{ inputs.comment_warmup }}
          COMMENT_OUTPUT: ${{ inputs.comment_output }}
          GRAPH_NODES: ${{ inputs.graph_nodes }}
          GRAPH_EDGES: ${{ inputs.graph_edges }}
          GRAPH_ITERATIONS: ${{ inputs.graph_iterations }}
          GRAPH_WARMUP: ${{ inputs.graph_warmup }}
          GRAPH_MODE: ${{ inputs.graph_mode }}
          GRAPH_OUTPUT: ${{ inputs.graph_output }}
          LAYOUT_NODES: ${{ inputs.layout_nodes }}
          LAYOUT_EDGES: ${{ inputs.layout_edges }}
          LAYOUT_ITERATIONS: ${{ inputs.layout_iterations }}
          LAYOUT_WARMUP: ${{ inputs.layout_warmup }}
          LAYOUT_ALGORITHM: ${{ inputs.layout_algorithm }}
          LAYOUT_VALIDATE_GRAPH: ${{ inputs.layout_validate_graph }}
          LAYOUT_VALIDATE_OPTIONS: ${{ inputs.layout_validate_options }}
          LAYOUT_OUTPUT: ${{ inputs.layout_output }}
          RECURSIVE_SCENARIO_PROFILE: ${{ inputs.recursive_scenario_profile }}
          RECURSIVE_SCENARIOS: ${{ inputs.recursive_scenarios }}
          RECURSIVE_SCENARIO_ITERATIONS: ${{ inputs.recursive_scenario_iterations }}
          RECURSIVE_SCENARIO_WARMUP: ${{ inputs.recursive_scenario_warmup }}
          RECURSIVE_SCENARIO_OUTPUT: ${{ inputs.recursive_scenario_output }}
          LAYERED_ISSUE_SCENARIOS: ${{ inputs.layered_issue_scenarios }}
          LAYERED_ISSUE_ITERATIONS: ${{ inputs.layered_issue_iterations }}
          LAYERED_ISSUE_WARMUP: ${{ inputs.layered_issue_warmup }}
          LAYERED_ISSUE_OUTPUT: ${{ inputs.layered_issue_output }}
      - name: Compare perf results
        run: sh scripts/compare_perf_results.sh "${{ inputs.regression_window }}" | tee perf/compare.txt
        env:
          PERF_COMPARE_MODE: ${{ inputs.perf_compare_mode }}
          PERF_BASELINE_LAYERED_FILE: ${{ inputs.baseline_layered_file }}
          PERF_BASELINE_RECURSIVE_SCENARIOS_FILE: ${{ inputs.baseline_recursive_scenarios_file }}
      - name: Check recursive runtime budget
        if: ${{ inputs.recursive_runtime_budget_gate == 'true' }}
        run: sh scripts/check_recursive_perf_runtime_budget.sh "${{ inputs.recursive_scenario_output }}" "${{ inputs.recursive_scenario_profile }}" perf/recursive_runtime_budget.md
        env:
          RECURSIVE_RUNTIME_BUDGET_STRICT: "true"
          RECURSIVE_BUDGET_MS_QUICK: ${{ inputs.recursive_runtime_budget_ms_quick }}
          RECURSIVE_BUDGET_MS_DEFAULT: ${{ inputs.recursive_runtime_budget_ms_default }}
          RECURSIVE_BUDGET_MS_FULL: ${{ inputs.recursive_runtime_budget_ms_full }}
      - name: Check regression gate
        if: ${{ inputs.regression_gate == 'true' }}
        run: sh scripts/check_perf_regression.sh "${{ inputs.regression_threshold }}" "${{ inputs.regression_window }}"
        env:
          PERF_COMPARE_MODE: ${{ inputs.perf_compare_mode }}
          PERF_BASELINE_LAYERED_FILE: ${{ inputs.baseline_layered_file }}
          PERF_BASELINE_RECURSIVE_SCENARIOS_FILE: ${{ inputs.baseline_recursive_scenarios_file }}
      - name: Run Java compare pipeline
        if: ${{ inputs.java_compare_enabled == 'true' }}
        run: sh scripts/run_perf_and_compare_java.sh "${{ inputs.java_results_file }}" "${{ inputs.regression_window }}" "${{ inputs.java_parity_threshold }}" perf/java_vs_rust.md
        env:
          LAYERED_ISSUE_SKIP_RUST_RUN: "true"
          LAYERED_ISSUE_OUTPUT: ${{ inputs.layered_issue_output }}
          LAYERED_ISSUE_SCENARIOS: ${{ inputs.layered_issue_scenarios }}
          LAYERED_ISSUE_ITERATIONS: ${{ inputs.layered_issue_iterations }}
          LAYERED_ISSUE_WARMUP: ${{ inputs.layered_issue_warmup }}
          JAVA_PERF_COMPARE_MODE: ${{ inputs.java_compare_mode }}
          JAVA_PERF_GENERATE: ${{ inputs.java_generate_enabled }}
          JAVA_PERF_DRY_RUN: ${{ inputs.java_generate_dry_run }}
          JAVA_PERF_ALLOW_GENERATE_FAILURE: ${{ inputs.java_allow_generate_failure }}
          JAVA_PERF_RETRIES: ${{ inputs.java_generate_retries }}
          JAVA_PERF_RETRY_DELAY_SECS: ${{ inputs.java_generate_retry_delay_secs }}
          JAVA_PERF_SKIP_DNS_CHECK: ${{ inputs.java_skip_dns_check }}
          JAVA_PERF_REQUIRED_HOSTS: ${{ inputs.java_required_hosts }}
          JAVA_PERF_SCENARIOS: ${{ inputs.layered_issue_scenarios }}
          JAVA_PERF_ITERATIONS: ${{ inputs.layered_issue_iterations }}
          JAVA_PERF_WARMUP: ${{ inputs.layered_issue_warmup }}
          JAVA_PERF_OUTPUT: ${{ inputs.java_results_file }}
          JAVA_PERF_EXTERNAL_ELK_ROOT: ${{ github.workspace }}/external/elk
          JAVA_PERF_EXTERNAL_ISOLATE: "true"
          JAVA_PERF_EXTERNAL_WORKTREE_ROOT: ${{ runner.temp }}
          # Isolate Tycho/Maven metadata to avoid lock conflicts on shared runners.
          JAVA_PERF_MVN_LOCAL_REPO: ${{ runner.temp }}/m2-java-perf-${{ github.run_id }}-${{ github.run_attempt }}
          JAVA_RESULTS_PARITY_GATE: ${{ inputs.java_parity_gate }}
          JAVA_BASELINE_FILE: ${{ inputs.java_baseline_file }}
          JAVA_BASELINE_OUTPUT: perf/java_vs_rust_baseline.md
          JAVA_BASELINE_THRESHOLD: ${{ inputs.java_baseline_parity_threshold }}
          JAVA_BASELINE_PARITY_GATE: ${{ inputs.java_baseline_parity_gate }}
          JAVA_ARTIFACT_MIN_ROWS: ${{ inputs.java_artifact_min_rows }}
          JAVA_ARTIFACT_REQUIRED_SCENARIOS: ${{ inputs.layered_issue_scenarios }}
          JAVA_PARITY_SCENARIO_THRESHOLDS_FILE: ${{ inputs.java_parity_thresholds_file }}
          JAVA_PERF_VERIFY_ARTIFACTS: "true"
      - name: Export Java baseline candidate
        if: ${{ inputs.java_compare_enabled == 'true' && inputs.java_export_baseline_candidate == 'true' }}
        run: sh scripts/export_java_baseline_candidate.sh "${{ inputs.java_results_file }}" "${{ inputs.java_baseline_candidate_file }}" perf/java_baseline_candidate_status.md
        env:
          JAVA_CANDIDATE_MIN_ROWS: ${{ inputs.java_artifact_min_rows }}
          JAVA_CANDIDATE_REQUIRED_SCENARIOS: ${{ inputs.layered_issue_scenarios }}
          JAVA_CANDIDATE_STRICT: ${{ inputs.java_export_candidate_strict }}
      - name: Check Java baseline candidate readiness
        if: ${{ inputs.java_compare_enabled == 'true' && inputs.java_export_baseline_candidate == 'true' }}
        run: sh scripts/check_java_baseline_candidate.sh "${{ inputs.java_baseline_candidate_file }}" "${{ inputs.layered_issue_output }}" "${{ inputs.regression_window }}" "${{ inputs.java_parity_threshold }}" perf/java_baseline_candidate_check.md
        env:
          JAVA_CANDIDATE_MIN_ROWS: ${{ inputs.java_artifact_min_rows }}
          JAVA_CANDIDATE_REQUIRED_SCENARIOS: ${{ inputs.layered_issue_scenarios }}
          JAVA_CANDIDATE_REQUIRE_PARITY: "true"
          JAVA_CANDIDATE_STRICT: ${{ inputs.java_export_candidate_strict }}
          JAVA_CANDIDATE_PARITY_THRESHOLDS_FILE: ${{ inputs.java_parity_thresholds_file }}
          TARGET_BASELINE: ${{ inputs.java_baseline_file }}
      - name: Summarize Java perf status
        if: ${{ inputs.java_compare_enabled == 'true' }}
        run: sh scripts/summarize_java_perf_status.sh perf/java_vs_rust.md perf/java_vs_rust_baseline.md "${{ inputs.java_results_file }}" "${{ inputs.java_baseline_file }}" perf/java_perf_status.md
        env:
          RUST_RESULTS_FILE: ${{ inputs.layered_issue_output }}
          JAVA_BASELINE_CANDIDATE_FILE: ${{ inputs.java_baseline_candidate_file }}
          JAVA_BASELINE_CANDIDATE_REPORT: perf/java_baseline_candidate_status.md
          JAVA_BASELINE_CANDIDATE_CHECK_REPORT: perf/java_baseline_candidate_check.md
      - name: Suggest Java parity thresholds
        if: ${{ inputs.java_compare_enabled == 'true' }}
        run: sh scripts/suggest_java_parity_thresholds.sh "${{ inputs.layered_issue_output }}" "${{ inputs.java_results_file }}" "${{ inputs.regression_window }}" 2 perf/java_parity_thresholds.suggested.csv
      - name: Summarize perf results
        run: sh scripts/summarize_perf_results.sh
      - name: Check CoreOptions parity
        run: sh scripts/check_core_options_parity.sh
      - name: Check Core option dependency parity
        run: sh scripts/check_core_option_dependency_parity.sh
      - name: Check algorithm ID parity
        run: sh scripts/check_algorithm_id_parity.sh
      - name: Check algorithm category parity
        run: sh scripts/check_algorithm_category_parity.sh
      - name: Check algorithm name parity
        run: sh scripts/check_algorithm_name_parity.sh
      - name: Check algorithm description parity
        run: sh scripts/check_algorithm_description_parity.sh
      - name: Check algorithm option support parity
        run: sh scripts/check_algorithm_option_support_parity.sh
      - name: Check algorithm option default parity
        run: sh scripts/check_algorithm_option_default_parity.sh
      - name: Check algorithm option default value parity
        run: sh scripts/check_algorithm_option_default_value_parity.sh
      - name: Check algorithm feature parity
        run: sh scripts/check_algorithm_feature_parity.sh
      - name: Check algorithm metadata parity
        run: sh scripts/check_algorithm_metadata_parity.sh
      - name: Check layered phase wiring parity
        run: sh scripts/check_layered_phase_wiring_parity.sh
      - name: Upload perf artifacts
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            perf/*.csv
            perf/compare.txt
            perf/recursive_runtime_budget.md
            perf/java_vs_rust.md
            perf/java_vs_rust_baseline.md
            perf/java_perf_status.md
            perf/java_baseline_candidate_status.md
            perf/java_baseline_candidate_check.md
            perf/core_options_parity.md
            perf/core_option_dependency_parity.md
            perf/algorithm_id_parity.md
            perf/algorithm_category_parity.md
            perf/algorithm_name_parity.md
            perf/algorithm_description_parity.md
            perf/algorithm_option_support_parity.md
            perf/algorithm_option_default_parity.md
            perf/algorithm_option_default_value_parity.md
            perf/algorithm_feature_parity.md
            perf/algorithm_metadata_parity.md
            perf/layered_phase_wiring_parity.md
            perf/layered_phase_wiring/*.tsv
            perf/summary.md
            perf/baselines/*.csv
