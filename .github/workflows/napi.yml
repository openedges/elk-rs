name: NAPI Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install cross-compilation deps (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - name: Install napi-cli
        run: npm install -g @napi-rs/cli
      - name: Build NAPI
        working-directory: plugins/org.eclipse.elk.napi
        run: npx napi build --release --platform --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.target }}
          path: plugins/org.eclipse.elk.napi/*.node

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move binaries to platform packages
        run: |
          for dir in artifacts/binding-*/; do
            for f in "$dir"*.node; do
              BASENAME=$(basename "$f" .node)
              TRIPLE=$(echo "$BASENAME" | sed 's/elk-rs\.//')
              if [ -d "plugins/org.eclipse.elk.js/npm/$TRIPLE" ]; then
                cp "$f" "plugins/org.eclipse.elk.js/npm/$TRIPLE/"
              fi
            done
          done
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in plugins/org.eclipse.elk.js/npm/*/; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm publish --access public)
            fi
          done
      - name: Publish main package
        working-directory: plugins/org.eclipse.elk.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
