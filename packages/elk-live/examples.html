<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ELK-RS Examples</title>
  <link rel="icon" type="image/svg+xml" href="img/elk_fav.svg">
  <link rel="stylesheet" href="./styles/common.css">
  <link rel="stylesheet" href="./styles/diagram.css">
  <style>
    body { min-height: 100vh; }
    .examples-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
      border-top: 1px solid var(--border-color);
    }
    .sidebar {
      width: 16.667%;
      min-width: 160px;
      overflow-y: auto;
      border-right: 1px solid var(--border-color);
      background: var(--sidebar-bg);
      list-style: none;
      padding-left: 0;
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 767px) {
      .sidebar { display: none; }
    }
    .sidebar li {
      list-style: none;
    }
    .sidebar-heading {
      font-size: .75rem;
      color: #6c757d;
      margin-top: .5rem;
      margin-bottom: .25rem;
    }
    .sidebar-link {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0 12px;
      font-size: .9rem;
      font-weight: 400;
      line-height: 1.5;
      background: transparent;
      border: 1px solid transparent;
      border-radius: .25rem;
      cursor: pointer;
      color: #007bff;
      text-decoration: underline;
      transition: color .15s ease-in-out;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
    }
    .sidebar-link:hover {
      text-decoration: underline;
      color: #0056b3;
    }
    .sidebar-link:focus {
      outline: 0;
      box-shadow: 0 0 0 .25rem rgba(13,110,253,.25);
      text-decoration: underline;
    }
    .sidebar-link.active {
      outline: 0;
      box-shadow: 0 0 0 .25rem rgba(13,110,253,.25);
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: 1.5rem;
    }
    .editor-diagram-row {
      display: flex;
      flex-shrink: 0;
    }
    .editor-pane #monaco-editor,
    .diagram-pane #diagram {
      height: 50vh;
    }
    .description-panel {
      border-top: 1px solid var(--border-color);
      margin: .5rem;
      padding-top: .5rem;
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }
    .description-inner {
      max-width: 50%;
      padding: .25rem;
      text-align: left;
    }
    @media (max-width: 767px) {
      .description-inner { max-width: 100%; }
    }
    .description-inner h4 {
      margin-bottom: .5rem;
    }
    .description-inner h4 .title-small {
      font-size: 70%;
      font-weight: 100;
      color: #6c757d;
    }
    .description-inner h4 .title-text {
      font-size: 1.9rem;
      font-weight: 300;
      line-height: 1.2;
    }
  </style>
</head>
<body class="d-flex flex-column">
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <span class="elk-logo-small"></span>
      ELK-RS Demonstrators
    </a>
    <div class="navbar-center">
      <span class="navbar-title">Examples</span>
    </div>
    <div class="navbar-right">
      <div id="darkModeToggle"></div>
    </div>
  </nav>

  <div class="examples-wrap">
    <ul class="sidebar" id="sidebar"></ul>
    <div class="main-content">
      <div class="editor-diagram-row">
        <div class="editor-pane">
          <div id="monaco-editor"></div>
          <div id="loading-editor" class="loading" style="margin: 0 .5rem;"></div>
        </div>
        <div class="diagram-pane">
          <div id="diagram"></div>
          <div id="loading" class="loading" style="margin: 0 .5rem;"></div>
          <div id="error-bar" class="error-bar"></div>
        </div>
      </div>
      <div class="description-panel">
        <div class="description-inner">
          <h4><small id="category-path" class="title-small"></small><br /><span id="example-title" class="title-text"></span></h4>
          <div id="example-description" class="text-left"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="flex-grow-1" style="text-align: right;">
      Powered by <a href="https://github.com/openedges/elk-rs">elk-rs</a> <span id="app-version"></span> (WASM)
    </div>
  </footer>

  <script type="module" src="./src/examples.ts"></script>
</body>
</html>
